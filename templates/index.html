{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card text-center">
            <h3 class="mb-4">Upload Student Data</h3>
            <p class="text-muted mb-4">Upload your CSV file containing student profiles (grades, interests, learning
                styles).</p>

            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="mb-4">
                    <label for="file" class="upload-zone d-block w-100">
                        <i class="fas fa-cloud-upload-alt fa-3x mb-3 text-primary"></i>
                        <p class="mb-0 text-muted">Drag & Drop your CSV here or Click to Browse</p>
                    </label>
                    <input type="file" id="file" name="file" accept=".csv" class="d-none" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">
                    <i class="fas fa-magic me-2"></i> Configure & Cluster
                </button>
            </form>

            <hr class="my-4" style="opacity: 0.1">

            <div>
                <p class="small text-muted mb-2">Don't have data?</p>
                <a href="/use-synthetic" class="btn btn-outline-secondary btn-sm rounded-pill px-4">
                    <i class="fas fa-robot me-1"></i> Generate Synthetic Data
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
